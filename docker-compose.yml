services:
  db:
    image: postgres:15-alpine
    container_name: project_db
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=secret_pass
      - POSTGRES_DB=app_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: